name: Build and Release Pake Installers

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

  schedule:
    - cron: '0 0 1 */2 *'

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Build MSI
        run: pake https://discord.com --targets msi

      - name: Collect MSI files
        shell: bash
        run: |
          mkdir -p artifacts

          find . -type f -name "*.msi" -exec cp {} artifacts/ \;

          echo "Collected files:"
          ls -la artifacts

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: artifacts/*.msi

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Build macOS packages
        run: |
          pake https://discord.com --targets app
          pake https://discord.com --targets dmg

      - name: Collect macOS files
        run: |
          mkdir -p artifacts

          find . -type d -name "*.app" -exec cp -R {} artifacts/ \;
          find . -type f -name "*.dmg" -exec cp {} artifacts/ \;

          echo "Collected files:"
          ls -la artifacts

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: artifacts/*

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Build DEB
        run: pake https://discord.com --targets deb

      - name: Collect DEB files
        run: |
          mkdir -p artifacts

          find . -type f -name "*.deb" -exec cp {} artifacts/ \;

          echo "Collected files:"
          ls -la artifacts

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: artifacts/*.deb

  create-release-and-commit:
    needs:
      - build-windows
      - build-macos
      - build-linux

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create projects directory
        run: |
          mkdir -p projects

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Debug downloaded files
        run: |
          echo "Downloaded artifacts:"
          find artifacts

      - name: Copy installers to projects
        run: |
          find artifacts -name "*.msi" -exec cp {} projects/ \;
          find artifacts -name "*.deb" -exec cp {} projects/ \;
          find artifacts -name "*.dmg" -exec cp {} projects/ \;

          find artifacts -name "*.app" -exec cp -R {} projects/ \;

          echo "Projects directory:"
          ls -la projects

      - name: Verify installers exist
        run: |
          COUNT=$(find projects | wc -l)

          if [ "$COUNT" -le 1 ]; then
            echo "No installers found"
            exit 1
          fi

      - name: Commit installers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/

          if git diff --staged --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "Update generated installers [skip ci]"

          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: |
            projects/**/*.msi
            projects/**/*.deb
            projects/**/*.dmg
            projects/**/*.app/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
