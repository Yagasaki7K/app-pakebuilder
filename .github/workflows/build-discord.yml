name: Build and Release Pake installers

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build MSI
        run: pake https://discord.com --targets msi
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ./*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build DMG
        run: pake https://discord.com --targets dmg
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ./*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build DEB
        run: pake https://discord.com --targets deb
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ./*.deb

  create-release-and-commit:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # garante todo o histórico para commit/push

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      # 🔍 Passos de depuração
      - name: List downloaded artifacts
        run: |
          echo "Conteúdo de ./artifacts:"
          ls -la ./artifacts || echo "Diretório vazio ou não existe"

      - name: Create projects folder and copy files
        run: |
          mkdir -p projects
          # Se houver subpastas, copia de lá também
          if [ -d "./artifacts" ]; then
            find ./artifacts -type f -name "*.msi" -o -name "*.dmg" -o -name "*.deb" | while read file; do
              cp "$file" ./projects/
            done
          fi
          echo "Arquivos copiados para ./projects:"
          ls -la ./projects || echo "Nenhum arquivo copiado"

      - name: Commit and push installers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/
          git status
          git diff --staged --quiet || git commit -m "Update installers [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: ./projects/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
