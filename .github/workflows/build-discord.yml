name: Build and Release Pake installers

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
  schedule:
    # Run on the 1st day of every 2 months at 00:00 UTC
    - cron: '0 0 1 */2 *'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build MSI
        run: pake https://discord.com --targets msi
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: ./*.msi

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build DMG
        run: pake https://discord.com --targets dmg
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ./*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev
      - name: Install pake-cli
        run: npm install -g pake-cli
      - name: Build DEB
        run: pake https://discord.com --targets deb
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: ./*.deb

  create-release-and-commit:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download all artifacts (preserves subfolders)
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # ---- DIAGNOSTIC BLOCK ----
      - name: Debug - List artifacts directory
        run: |
          echo "=== Full directory tree of ./artifacts ==="
          find ./artifacts -type f || echo "No files found in ./artifacts"
          echo ""
          echo "=== Detailed listing ==="
          ls -Rla ./artifacts || echo "Directory does not exist"
      # ---- END DIAGNOSTIC ----

      # Ensure projects folder exists and copy files
      - name: Copy files to projects folder
        run: |
          mkdir -p projects
          echo "Copying .msi files..."
          if [ -d "./artifacts/windows-msi" ]; then
            cp ./artifacts/windows-msi/*.msi ./projects/ 2>/dev/null || echo "⚠️ No .msi found inside windows-msi"
          else
            echo "⚠️ Folder windows-msi does not exist"
          fi

          echo "Copying .dmg files..."
          if [ -d "./artifacts/macos-dmg" ]; then
            cp ./artifacts/macos-dmg/*.dmg ./projects/ 2>/dev/null || echo "⚠️ No .dmg found inside macos-dmg"
          else
            echo "⚠️ Folder macos-dmg does not exist"
          fi

          echo "Copying .deb files..."
          if [ -d "./artifacts/linux-deb" ]; then
            cp ./artifacts/linux-deb/*.deb ./projects/ 2>/dev/null || echo "⚠️ No .deb found inside linux-deb"
          else
            echo "⚠️ Folder linux-deb does not exist"
          fi

          echo "=== Final contents of ./projects ==="
          ls -la ./projects || echo "⚠️ projects folder is empty"

      # Commit and push if there are changes
      - name: Commit and push installers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add projects/

          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
          else
            git commit -m "Update installers [skip ci]"
            git push origin HEAD:main
          fi

      # Create GitHub Release (using files from projects/)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Release v${{ github.run_number }}"
          files: ./projects/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
