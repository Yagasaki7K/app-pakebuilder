name: Build iLovePDF Pake Installers

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read

concurrency:
  group: pake-ilovepdf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare artifact directory
        shell: bash
        run: mkdir -p "artifacts/windows"
      - name: Install Pake CLI with npm
        shell: bash
        run: npm install --global pake-cli
      - name: Verify Pake CLI
        shell: bash
        run: pake --version
      - name: Build Windows installer
        shell: bash
        run: pake "https://www.ilovepdf.com" --name "iLovePDF"
      - name: Discover and collect Windows installer
        shell: bash
        run: scripts/ci/collect-pake-artifacts.sh --kind windows --search-root . --output-dir "artifacts/windows"
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: ilovepdf-windows-msi
          path: artifacts/windows/*.msi
          if-no-files-found: error

  build-linux:
    name: Build Linux DEB
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare artifact directory
        run: mkdir -p "artifacts/linux"
      - name: Install Linux dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libpango1.0-dev libcairo2-dev
      - name: Install Pake CLI with npm
        run: npm install --global pake-cli
      - name: Verify Pake CLI
        run: pake --version
      - name: Build Linux installer
        run: pake "https://www.ilovepdf.com" --name "iLovePDF" --targets deb
      - name: Discover and collect Linux installer
        run: scripts/ci/collect-pake-artifacts.sh --kind linux --search-root . --output-dir "artifacts/linux"
      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: ilovepdf-linux-deb
          path: artifacts/linux/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS APP and DMG
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Prepare artifact directory
        run: mkdir -p "artifacts/macos"
      - name: Install Pake CLI with npm
        run: npm install --global pake-cli
      - name: Verify Pake CLI
        run: pake --version
      - name: Build macOS application bundle and disk image
        run: pake "https://www.ilovepdf.com" --name "iLovePDF"
      - name: Discover and collect macOS artifacts
        run: scripts/ci/collect-pake-artifacts.sh --kind macos --search-root . --output-dir "artifacts/macos"
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ilovepdf-macos-app-dmg
          path: artifacts/macos
          if-no-files-found: error

  publish:
    name: Commit projects directory and publish release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare local directories
        run: |
          set -euo pipefail
          rm -rf "artifacts"
          mkdir -p "projects" "artifacts/downloaded"
          find "projects" -mindepth 1 -maxdepth 1 \( -name 'iLovePDF.*' -o -name 'iLovePDF.app' \) -exec rm -rf {} +
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/downloaded
          merge-multiple: false
      - name: Copy verified installers into projects
        run: |
          set -euo pipefail
          find "artifacts/downloaded" -type f \( -name '*.msi' -o -name '*.deb' -o -name '*.dmg' \) -exec cp -f {} "projects/" \;
          while IFS= read -r -d '' app; do rm -rf "projects/$(basename "$app")"; cp -R "$app" "projects/"; done < <(find "artifacts/downloaded" -type d -name '*.app' -print0)
      - name: Validate projects directory
        run: scripts/ci/validate-projects.sh "projects" "iLovePDF"
      - name: Commit generated installers
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "projects/"
          if git diff --staged --quiet; then echo "No generated installer changes to commit."; else git commit -m "Update iLovePDF installers [skip ci]"; git push origin "HEAD:${{ github.ref_name }}"; fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ilovepdf-v${{ github.run_number }}
          name: iLovePDF Release v${{ github.run_number }}
          files: |
            projects/iLovePDF*.msi
            projects/iLovePDF*.deb
            projects/iLovePDF*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
